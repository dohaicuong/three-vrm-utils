name: CI

on:
  push:
    branches: [master]

jobs:
  ci:
    timeout-minutes: 15

    strategy:
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - run: ls
      - run: vp install
      - run: vp check
      - run: vp test
      - run: vp pack
