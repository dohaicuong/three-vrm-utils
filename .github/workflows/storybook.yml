name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - uses: actions/checkout@v6
      - run: vp install

      # Build Storybook
      - run: vp exec storybook build -o storybook-static

      # Build Starlight docs
      - run: vp run build-docs

      # Combine into single site
      - run: |
          mkdir -p _site/storybook
          mkdir -p _site/docs
          cp -r storybook-static/* _site/storybook/
          cp -r docs/dist/* _site/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
